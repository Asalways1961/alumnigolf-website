<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — Alumni Golf</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:Arial,sans-serif; background:#0A1F44; min-height:100vh; display:flex; align-items:center; justify-content:center; }
.box { background:#122040; border:1px solid rgba(255,255,255,0.08); border-radius:20px; padding:48px 40px; width:100%; max-width:420px; box-shadow:0 4px 24px rgba(0,0,0,0.4); }
.logo { text-align:center; margin-bottom:24px; }
.logo img { height:80px; width:auto; }
.logo p { color:#aaa; font-size:11px; letter-spacing:3px; text-transform:uppercase; margin-top:8px; }
.divider { height:1px; background:rgba(255,255,255,0.08); margin-bottom:24px; }
h2 { color:#C89B3C; font-size:22px; text-align:center; margin-bottom:8px; }
.sub { color:#aaa; font-size:13px; text-align:center; margin-bottom:24px; }
label { display:block; color:#aaa; font-size:11px; font-weight:600; letter-spacing:1px; text-transform:uppercase; margin-bottom:6px; }
.pw-wrap { position:relative; margin-bottom:16px; }
.pw-wrap input { width:100%; padding:12px 44px 12px 16px; background:#0A2050; border:1px solid rgba(255,255,255,0.08); border-radius:10px; color:#f0f0f0; font-size:14px; }
.pw-wrap input:focus { outline:none; border-color:#C89B3C; }
.pw-wrap button { position:absolute; right:12px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; color:#aaa; font-size:18px; padding:4px; line-height:1; }
.pw-wrap button:hover { color:#C89B3C; }
.btn-submit { width:100%; padding:14px; background:#C89B3C; color:#000; border:none; border-radius:10px; font-size:14px; font-weight:700; letter-spacing:1px; text-transform:uppercase; cursor:pointer; margin-top:4px; }
.btn-submit:hover { opacity:0.9; }
.btn-submit:disabled { opacity:0.5; cursor:not-allowed; }
.msg { text-align:center; font-size:13px; margin-top:16px; padding:12px; border-radius:8px; display:none; }
.msg.success { background:rgba(27,77,46,0.2); border:1px solid rgba(27,77,46,0.4); color:#4CAF50; }
.msg.error { background:rgba(229,57,53,0.15); border:1px solid rgba(229,57,53,0.3); color:#E53935; }
</style>
</head>
<body>
<div class="box">
  <div class="logo">
    <img src="/Full_Logo.jpg" alt="Alumni Golf" />
    <p>Player Portal</p>
  </div>
  <div class="divider"></div>
  <h2>Reset Your Password</h2>
  <p class="sub">Enter your new password below</p>
  <div style="margin-top:20px;">
    <label>New Password</label>
    <div class="pw-wrap">
      <input type="password" id="new-password" placeholder="Enter new password" />
      <button type="button" onclick="togglePw('new-password',this)">👁</button>
    </div>
    <label>Confirm Password</label>
    <div class="pw-wrap">
      <input type="password" id="confirm-password" placeholder="Confirm new password" />
      <button type="button" onclick="togglePw('confirm-password',this)">👁</button>
    </div>
    <button class="btn-submit" id="reset-btn" onclick="doReset()">Set New Password</button>
    <div class="msg" id="msg"></div>
  </div>
</div>
<script>
var sb = supabase.createClient(
  'https://weztrzuxwycypheyiixr.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndlenRyenV4d3ljeXBoZXlpaXhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE0MzYzMTYsImV4cCI6MjA4NzAxMjMxNn0.t6P20qa8QZAMxxi1K0HLRaVJtH7XOmBeL851-ewaAWA'
);

function togglePw(fieldId, btn) {
  var input = document.getElementById(fieldId);
  if (input.type === 'password') {
    input.type = 'text';
    btn.textContent = '🙈';
  } else {
    input.type = 'password';
    btn.textContent = '👁';
  }
}

function doReset() {
  var pass = document.getElementById('new-password').value;
  var confirm = document.getElementById('confirm-password').value;
  var msg = document.getElementById('msg');
  var btn = document.getElementById('reset-btn');
  msg.style.display = 'none';
  if (!pass || pass.length < 6) {
    msg.textContent = 'Password must be at least 6 characters.';
    msg.className = 'msg error';
    msg.style.display = 'block';
    return;
  }
  if (pass !== confirm) {
    msg.textContent = 'Passwords do not match.';
    msg.className = 'msg error';
    msg.style.display = 'block';
    return;
  }
  btn.disabled = true;
  btn.textContent = 'Updating...';
  sb.auth.updateUser({ password: pass }).then(function(res) {
    if (res.error) {
      msg.textContent = 'Error: ' + res.error.message;
      msg.className = 'msg error';
      msg.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Set New Password';
    } else {
      msg.textContent = 'Password updated! Redirecting...';
      msg.className = 'msg success';
      msg.style.display = 'block';
      setTimeout(function() { window.location.href = '/admin'; }, 2000);
    }
  });
}
</script>
</body>
</html>
