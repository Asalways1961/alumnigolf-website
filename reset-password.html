<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — Alumni Golf Admin</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Arial',sans-serif; background:#0A1F44; min-height:100vh; display:flex; align-items:center; justify-content:center; }
  .box { background:#122040; border:1px solid rgba(255,255,255,0.08); border-radius:20px; padding:48px 40px; width:100%; max-width:420px; box-shadow:0 4px 24px rgba(0,0,0,0.4); }
  .logo { text-align:center; margin-bottom:24px; }
  .logo img { height:80px; width:auto; }
  .logo p { color:#aaa; font-size:11px; letter-spacing:3px; text-transform:uppercase; margin-top:8px; }
  h2 { color:#C89B3C; font-size:22px; text-align:center; margin-bottom:8px; }
  .sub { color:#aaa; font-size:13px; text-align:center; margin-bottom:24px; }
  .divider { height:1px; background:rgba(255,255,255,0.08); margin-bottom:24px; }
  label { display:block; color:#aaa; font-size:11px; font-weight:600; letter-spacing:1px; text-transform:uppercase; margin-bottom:6px; }
  input { width:100%; padding:12px 16px; background:#0A2050; border:1px solid rgba(255,255,255,0.08); border-radius:10px; color:#f0f0f0; font-size:14px; margin-bottom:16px; }
  input:focus { outline:none; border-color:#C89B3C; }
  button { width:100%; padding:14px; background:#C89B3C; color:#000; border:none; border-radius:10px; font-size:14px; font-weight:700; letter-spacing:1px; text-transform:uppercase; cursor:pointer; }
  button:hover { opacity:0.9; }
  button:disabled { opacity:0.5; cursor:not-allowed; }
  .msg { text-align:center; font-size:13px; margin-top:16px; padding:12px; border-radius:8px; display:none; }
  .msg.success { background:rgba(27,77,46,0.2); border:1px solid rgba(27,77,46,0.4); color:#4CAF50; }
  .msg.error { background:rgba(229,57,53,0.15); border:1px solid rgba(229,57,53,0.3); color:#E53935; }
</style>
</head>
<body>
<div class="box">
  <div class="logo">
    <img src="/Full_Logo.jpg" alt="Alumni Golf" />
    <p>Admin Panel</p>
  </div>
  <div class="divider"></div>
  <h2>Reset Your Password</h2>
  <p class="sub">Enter your new password below</p>
  <div style="margin-top:20px;">
    <label>New Password</label>
    <input type="password" id="new-password" placeholder="Enter new password" />
    <label>Confirm Password</label>
    <input type="password" id="confirm-password" placeholder="Confirm new password" />
    <button id="reset-btn" onclick="doReset()">Set New Password</button>
    <div class="msg" id="msg"></div>
  </div>
</div>

<script>
const sb = supabase.createClient(
  'https://weztrzuxwycypheyiixr.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndlenRyenV4d3ljeXBoZXlpaXhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE0MzYzMTYsImV4cCI6MjA4NzAxMjMxNn0.t6P20qa8QZAMxxi1K0HLRaVJtH7XOmBeL851-ewaAWA'
);

async function doReset() {
  const pass = document.getElementById('new-password').value;
  const confirm = document.getElementById('confirm-password').value;
  const msg = document.getElementById('msg');
  const btn = document.getElementById('reset-btn');

  msg.style.display = 'none';

  if (!pass || pass.length < 6) {
    msg.textContent = 'Password must be at least 6 characters.';
    msg.className = 'msg error';
    msg.style.display = 'block';
    return;
  }
  if (pass !== confirm) {
    msg.textContent = 'Passwords do not match.';
    msg.className = 'msg error';
    msg.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Updating...';

  const { error } = await sb.auth.updateUser({ password: pass });

  if (error) {
    msg.textContent = 'Error: ' + error.message;
    msg.className = 'msg error';
    msg.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Set New Password';
  } else {
    msg.textContent = '✅ Password updated! Redirecting to admin panel...';
    msg.className = 'msg success';
    msg.style.display = 'block';
    setTimeout(function() {
      window.location.href = '/admin';
    }, 2000);
  }
}
</script>
</body>
</html>
