<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Divisions — Alumni Schools Golf Challenge</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --gold: #C89B3C;
    --gold-dim: rgba(200,155,60,0.15);
    --bg: #1B3A6B;
    --bg2: #1B3A6B;
    --card: rgba(255,255,255,0.05);
    --border: rgba(255,255,255,0.1);
    --text: #ffffff;
    --text2: #aaaaaa;
    --text3: #555555;
    --radius: 12px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

  /* HEADER */
  header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo { font-family:'Cormorant Garamond',serif; font-size:22px; font-weight:700; color:var(--gold); letter-spacing:0.5px; }
  .logo span { font-size:13px; color:var(--text2); font-family:'DM Sans',sans-serif; font-weight:400; display:block; line-height:1; }
  .back-btn {
    font-size:13px; color:var(--text2); text-decoration:none;
    padding:8px 16px; border:1px solid var(--border); border-radius:8px;
    transition:all 0.2s;
  }
  .back-btn:hover { color:var(--gold); border-color:var(--gold); }

  /* HERO */
  .hero {
    text-align:center;
    padding: 48px 24px 32px;
    background: radial-gradient(ellipse at 50% 0%, rgba(212,175,55,0.08) 0%, transparent 70%);
    border-bottom: 1px solid var(--border);
  }
  .hero h1 { font-family:'Cormorant Garamond',serif; font-size:36px; font-weight:700; color:var(--gold); margin-bottom:8px; }
  .hero p { font-size:14px; color:var(--text2); }

  /* SEARCH + FILTER */
  .controls {
    max-width:1200px;
    margin:32px auto 0;
    padding:0 24px;
    display:flex;
    gap:12px;
    align-items:center;
    flex-wrap:wrap;
  }
  .search-input {
    flex:1; min-width:200px;
    background:var(--card); border:1px solid var(--border); color:var(--text);
    padding:10px 16px; border-radius:8px; font-size:14px; font-family:'DM Sans',sans-serif;
    outline:none; transition:border-color 0.2s;
  }
  .search-input:focus { border-color:var(--gold); }
  .filter-btn {
    padding:10px 16px; border-radius:8px; font-size:13px; font-family:'DM Sans',sans-serif;
    border:1px solid var(--border); background:var(--card); color:var(--text2);
    cursor:pointer; transition:all 0.2s; white-space:nowrap;
  }
  .filter-btn.active, .filter-btn:hover { border-color:var(--gold); color:var(--gold); background:var(--gold-dim); }
  .stats-bar {
    max-width:1200px; margin:20px auto 0; padding:0 24px;
    display:flex; gap:24px; flex-wrap:wrap;
  }
  .stat { font-size:13px; color:var(--text2); }
  .stat strong { color:var(--gold); font-size:18px; display:block; }

  /* GRID */
  .grid {
    max-width:1200px;
    margin:24px auto 48px;
    padding:0 24px;
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
    gap:20px;
  }

  /* DIVISION CARD */
  .div-card {
    background:var(--card);
    border:1px solid var(--border);
    border-radius:var(--radius);
    overflow:hidden;
    transition:border-color 0.2s, transform 0.2s;
  }
  .div-card:hover { border-color:var(--gold); transform:translateY(-2px); }
  .div-header {
    padding:16px 20px;
    border-bottom:1px solid var(--border);
    display:flex; justify-content:space-between; align-items:center;
    background: linear-gradient(135deg, rgba(212,175,55,0.05) 0%, transparent 100%);
  }
  .div-name { font-weight:700; font-size:17px; font-family:'Cormorant Garamond',serif; }
  .div-meta { display:flex; gap:8px; align-items:center; }
  .badge {
    font-size:11px; font-weight:600; padding:3px 8px; border-radius:20px;
    letter-spacing:0.3px;
  }
  .badge-setup { background:rgba(85,85,85,0.3); color:#aaa; }
  .badge-active { background:rgba(212,175,55,0.15); color:var(--gold); }
  .badge-locked { background:rgba(76,175,80,0.15); color:#4caf50; }
  .badge-teams { background:rgba(255,255,255,0.06); color:var(--text2); }

  /* TEAM LIST */
  .team-list { padding:12px 16px; }
  .team-row {
    border:1px solid var(--border);
    border-radius:8px;
    padding:10px 14px;
    margin-bottom:8px;
    background:var(--bg2);
    transition:border-color 0.15s;
  }
  .team-row:last-child { margin-bottom:0; }
  .team-row:hover { border-color:rgba(212,175,55,0.3); }
  .team-top {
    display:flex; justify-content:space-between; align-items:center;
    margin-bottom:6px;
  }
  .team-name { font-weight:700; font-size:13px; color:var(--gold); }
  .team-record {
    font-size:11px; color:var(--text3);
    background:rgba(255,255,255,0.04);
    padding:2px 8px; border-radius:4px;
  }
  .team-record span { color:var(--text2); }
  .player-row { font-size:12px; color:var(--text2); margin-bottom:2px; display:flex; align-items:center; gap:6px; }
  .player-row:last-child { margin-bottom:0; }
  .player-icon { font-size:10px; opacity:0.5; }
  .no-player { color:var(--text3); font-style:italic; }

  .empty-div {
    padding:20px; text-align:center; color:var(--text3); font-size:13px;
  }

  /* LOADING */
  .spinner {
    width:36px; height:36px; border:3px solid var(--border);
    border-top-color:var(--gold); border-radius:50%;
    animation:spin 0.8s linear infinite; margin:0 auto;
  }
  @keyframes spin { to { transform:rotate(360deg); } }
  .loading { padding:60px; text-align:center; color:var(--text3); grid-column:1/-1; }

  /* FOOTER */
  footer {
    text-align:center; padding:32px 24px;
    border-top:1px solid var(--border);
    color:var(--text3); font-size:12px;
  }
  footer a { color:var(--gold); text-decoration:none; }

  @media(max-width:600px) {
    .hero h1 { font-size:26px; }
    .grid { grid-template-columns:1fr; padding:0 16px; }
    .controls { padding:0 16px; }
    .stats-bar { padding:0 16px; }
  }
</style>
</head>
<body>

<nav style="background:#1B3A6B;padding:0 40px;display:flex;align-items:center;justify-content:space-between;height:70px;border-bottom:2px solid #C89B3C;position:sticky;top:0;z-index:100;">
  <a href="home.html" style="text-decoration:none;display:flex;align-items:center;gap:12px;">
    <img src="/Alumni_Logo.png" alt="Alumni Schools Golf Challenge" style="height:50px;width:auto;object-fit:contain;">
    <span style="font-family:'Cormorant Garamond',serif;color:white;font-size:20px;font-weight:600;">Alumni Schools Golf Challenge</span>
  </a>
  <div style="display:flex;gap:28px;align-items:center;">
    <a href="home.html" style="color:rgba(255,255,255,0.75);text-decoration:none;font-size:13px;font-weight:500;transition:color 0.2s;">Home</a>
    <a href="how-it-works.html" style="color:rgba(255,255,255,0.75);text-decoration:none;font-size:13px;font-weight:500;transition:color 0.2s;">How It Works</a>
    <a href="schools.html" style="color:rgba(255,255,255,0.75);text-decoration:none;font-size:13px;font-weight:500;transition:color 0.2s;">Schools</a>
    <a href="divisions.html" style="color:#C89B3C;text-decoration:none;font-size:13px;font-weight:500;transition:color 0.2s;">Divisions</a>
    <a href="register.html" style="color:rgba(255,255,255,0.75);text-decoration:none;font-size:13px;font-weight:500;transition:color 0.2s;">Register</a>
    <a href="contact.html" style="color:rgba(255,255,255,0.75);text-decoration:none;font-size:13px;font-weight:500;transition:color 0.2s;">Contact</a>
  </div>
  <div style="display:flex;gap:12px;align-items:center;">
    <a href="register.html" style="background:#C89B3C;color:#1B3A6B;padding:9px 22px;border-radius:6px;font-size:13px;font-weight:700;text-decoration:none;transition:opacity 0.2s;">Register Now</a>
    <a href="portal.html" style="background:transparent;color:#C89B3C;border:2px solid #C89B3C;padding:7px 18px;border-radius:6px;font-size:13px;font-weight:700;text-decoration:none;transition:all 0.2s;">Login</a>
  </div>
</nav>

<div class="hero">
  <h1>🏆 Divisions</h1>
  <p>All competing divisions and their teams</p>
</div>

<div class="controls">
  <input class="search-input" id="search" placeholder="🔍  Search division or team..." oninput="render()">

</div>

<div class="stats-bar" id="stats-bar"></div>

<div class="grid" id="grid">
  <div class="loading"><div class="spinner"></div><div style="margin-top:16px;">Loading divisions...</div></div>
</div>

<footer>
  &copy; 2026 Alumni Schools Golf Challenge &nbsp;·&nbsp; <a href="/">Home</a> &nbsp;·&nbsp; <a href="/portal.html">Player Portal</a>
</footer>

<script>
const SUPABASE_URL = 'https://weztrzuxwycypheyiixr.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndlenRyenV4d3ljeXBoZXlpaXhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE0MzYzMTYsImV4cCI6MjA4NzAxMjMxNn0.t6P20qa8QZAMxxi1K0HLRaVJtH7XOmBeL851-ewaAWA';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

let allDivisions = [];
let allTeams = [];
let allPlayers = [];
let currentFilter = 'all';

async function load() {
  const { data: divs } = await sb.from('divisions').select('*').order('name', { ascending: true });
  const { data: teams } = await sb.from('division_teams').select('*').order('team_number', { ascending: true });

  const teamNumbers = (teams || []).map(t => t.team_number);
  let players = [];
  if (teamNumbers.length > 0) {
    const { data: pl } = await sb.from('players')
      .select('full_name, email, team_number')
      .in('team_number', teamNumbers);
    players = pl || [];
  }

  allDivisions = divs || [];
  allTeams = teams || [];
  allPlayers = players;

  renderStats();
  render();
}

function renderStats() {
  const totalTeams = allTeams.length;
  const totalDivisions = allDivisions.length;
  const locked = allDivisions.filter(d => d.status === 'locked').length;
  document.getElementById('stats-bar').innerHTML = `
    <div class="stat"><strong>${totalDivisions}</strong>Divisions</div>
    <div class="stat"><strong>${totalTeams}</strong>Teams</div>
    <div class="stat"><strong>${locked}</strong>Locked</div>
    <div class="stat"><strong>${totalTeams * 2}</strong>Players (max)</div>
  `;
}

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + f).classList.add('active');
  render();
}

function render() {
  const q = document.getElementById('search').value.toLowerCase().trim();

  let divs = allDivisions;
  if (currentFilter !== 'all') divs = divs.filter(d => d.status === currentFilter);
  if (q) {
    divs = divs.filter(d => {
      if (d.name.toLowerCase().includes(q)) return true;
      const divTeams = allTeams.filter(t => t.division_id === d.id);
      return divTeams.some(t => t.team_number.toLowerCase().includes(q));
    });
  }

  if (divs.length === 0) {
    document.getElementById('grid').innerHTML = `
      <div class="loading" style="color:var(--text3);">No divisions match your search.</div>`;
    return;
  }

  // Sort divisions by most teams first
  divs = [...divs].sort((a, b) => {
    const aTeams = allTeams.filter(t => t.division_id === a.id).length;
    const bTeams = allTeams.filter(t => t.division_id === b.id).length;
    return bTeams - aTeams;
  });

  document.getElementById('grid').innerHTML = divs.map(d => {
    // Sort teams by most wins first
    const divTeams = allTeams.filter(t => t.division_id === d.id)
      .sort((a, b) => (parseInt(b.wins) || 0) - (parseInt(a.wins) || 0));
    const statusBadge = d.status === 'locked'
      ? '<span class="badge badge-locked">🔒 Locked</span>'
      : d.status === 'active'
      ? '<span class="badge badge-active">⚡ Active</span>'
      : '<span class="badge badge-setup">⚙️ Setup</span>';

    const teamsHtml = divTeams.length === 0
      ? '<div class="empty-div">No teams assigned yet</div>'
      : divTeams.map((t, i) => {
          const teamPlayers = allPlayers.filter(p => p.team_number === t.team_number);
          const p1 = teamPlayers[0];
          const p2 = teamPlayers[1];
          const wins = parseInt(t.wins) || 0;
          const losses = parseInt(t.losses) || 0;
          return `<div class="team-row">
            <div class="team-top">
              <div class="team-name">${i + 1}. ${t.team_number}</div>
              <div class="team-record"><span>${wins}W</span> · <span>${losses}L</span></div>
            </div>
            <div class="player-row">
              <span class="player-icon">▸</span>
              ${p1 ? `<span>${p1.full_name || p1.email}</span>` : '<span class="no-player">Player 1 — pending registration</span>'}
            </div>
            <div class="player-row">
              <span class="player-icon">▸</span>
              ${p2 ? `<span>${p2.full_name || p2.email}</span>` : '<span class="no-player">Player 2 — pending registration</span>'}
            </div>
          </div>`;
        }).join('');

    return `<div class="div-card">
      <div class="div-header">
        <div class="div-name">${d.name}</div>
        <div class="div-meta">
          ${statusBadge}
          <span class="badge badge-teams">${divTeams.length}/8</span>
        </div>
      </div>
      <div class="team-list">${teamsHtml}</div>
    </div>`;
  }).join('');
}

load();
</script>
</body>
</html>
